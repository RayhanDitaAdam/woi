<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snap Lens Fullscreen</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #my-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .controls {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 1rem;
    }

    .btn-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-circle:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.1);
    }

    .btn-circle:active {
      transform: scale(0.95);
    }

    .btn-circle i {
      width: 28px;
      height: 28px;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-ClJJ4syz.js"></script>
</head>
<body>
  <canvas id="my-canvas"></canvas>
  
  <div class="controls">
    <button id="switch-camera" class="btn-circle" title="Switch Camera">
      <i data-lucide="refresh-cw"></i>
    </button>
  </div>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
