<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snap Lens Fullscreen</title>
  
  <script type="importmap">
    {
      "imports": {
        "@snap/camera-kit": "https://esm.sh/@snap/camera-kit"
      }
    }
  </script>

  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #my-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    
    #switch-btn {
      position: absolute; top: 20px; right: 20px; z-index: 10;
      width: 50px; height: 50px; border-radius: 50%; border: none;
      background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px);
      color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform 0.3s ease; -webkit-tap-highlight-color: transparent;
    }
    #switch-btn:active { transform: scale(0.9); }
  </style>
</head>
<body>

  <canvas id="my-canvas"></canvas>
  <button id="switch-btn"><i data-lucide="refresh-cw"></i></button>

  <script type="module">
    import { bootstrapCameraKit, createMediaStreamSource, Transform2D } from "@snap/camera-kit";

    let session, currentSource;
    let currentFacingMode = 'user'; // default kamera depan
    const canvas = document.getElementById("my-canvas");
    const btn = document.getElementById('switch-btn');

    lucide.createIcons();

    async function initCamera(mode) {
      // Ambil stream baru
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: mode } 
      });

      // Buat source untuk Snap Kit
      const source = createMediaStreamSource(stream, {
        transform: mode === 'user' ? Transform2D.MirrorX : Transform2D.None,
        cameraType: mode
      });

      // Set source ke session yang udah ada
      await session.setSource(source);
      currentSource = source;
    }

    async function init() {
      try {
        const apiToken = "eyJhbGciOiJIUzI1NiIsImtpZCI6IkNhbnZhc1MyU0hNQUNQcm9kIiwidHlwIjoiSldUIn0.eyJhdWQiOiJjYW52YXMtY2FudmFzYXBpIiwiaXNzIjoiY2FudmFzLXMyc3Rva2VuIiwibmJmIjoxNzY2NTQ2NTcwLCJzdWIiOiI5ZjMzNjgyMC1mZmU1LTRiOWUtYWU3Zi02NWEwMGQ3ZDRkZGF-UFJPRFVDVElPTn44NWVhMDc1Zi0yNzU0LTRhZDMtYTkxOS04NDM1ZTZmZjZlMmMifQ.GsN5muzCjhgw9L2IBV__jYK7XTA4AAG1cJjFmGpoITE";
        const cameraKit = await bootstrapCameraKit({ apiToken });
        
        // Buat session sekali aja
        session = await cameraKit.createSession({ liveRenderTarget: canvas });

        // Load & Apply Lens
        const lens = await cameraKit.lensRepository.loadLens(
          "904d21c1-8594-46c8-9213-75e96917fd88",
          "80fbb4a2-5c57-4bc6-8821-8494bf5a8e69"
        );
        await session.applyLens(lens);

        // Jalankan kamera pertama kali
        await initCamera(currentFacingMode);
        await session.play();

        console.log("Lens started!");
      } catch (err) {
        console.error("Gagal init:", err);
      }
    }

    // Logic Switch Camera
    btn.addEventListener('click', async () => {
      currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
      
      // Animasi putar icon
      btn.style.transform = 'rotate(180deg)';
      
      await initCamera(currentFacingMode);
      
      setTimeout(() => btn.style.transform = 'rotate(0deg)', 300);
    });

    init();
  </script>
</body>
</html>
