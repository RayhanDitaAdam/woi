<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snap Lens Fullscreen</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Reset & Fullscreen */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      font-family: sans-serif;
    }

    #my-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Tombol Switch */
    #switch-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }

    #switch-btn:active {
      background: rgba(255, 255, 255, 0.4);
      transform: scale(0.95);
    }

    i {
      width: 24px;
      height: 24px;
    }
  </style>
</head>
<body>

  <canvas id="my-canvas"></canvas>

  <button id="switch-btn" title="Switch Camera">
    <i data-lucide="refresh-cw"></i>
  </button>

  <script type="module">
    // Logic Index.js digabung di sini
    let currentFacingMode = 'user'; 
    let stream = null;
    const canvas = document.getElementById('my-canvas');
    const btn = document.getElementById('switch-btn');

    // Inisialisasi Icon
    lucide.createIcons();

    async function startCamera(mode) {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }

      try {
        const constraints = {
          video: {
            facingMode: mode,
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        };

        stream = await navigator.mediaDevices.getUserMedia(constraints);
        
        // Logika untuk render ke canvas (Snap Kit / Manual)
        // Jika pakai Snap Kit, panggil method session.setVideoSource(stream) di sini
        console.log(`Camera active: ${mode}`);
        
      } catch (err) {
        console.error("Error akses kamera:", err);
        alert("Gagal akses kamera: " + err.message);
      }
    }

    // Event Listener Switch
    btn.addEventListener('click', () => {
      currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
      startCamera(currentFacingMode);
      
      // Animasi putar icon
      btn.style.transform = 'rotate(180deg)';
      setTimeout(() => btn.style.transform = 'rotate(0deg)', 300);
    });

    // Jalankan pertama kali
    startCamera(currentFacingMode);
  </script>
</body>
</html>
